  {

    fit: "Recommend clarifying which specific foundation or program this refers to — country of origin and focus area would help narrow this down significantly."
  },
  {

const statusBadge = { open: 'badge-green', upcoming: 'badge-amber', closed: 'badge-red', check: 'badge-purple' };
const filterState = { open: true, upcoming: true, closed: true, check: true };
let openCard = null;

function dots(n) {
  let s = '';
  for (let i = 0; i < 5; i++) s += `<div class="dot ${i < n ? 'dot-fill' : 'dot-empty'}"></div>`;
  return `<div class="relevance-dots">${s}</div>`;
}

function chevronSVG() {
  return `<svg class="chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function render() {
  const list = document.getElementById('grant-list');
  const visible = grants.filter(g => filterState[g.status]);
  if (!visible.length) {
    list.innerHTML = '<div class="empty">No grants match the selected filters.</div>';
    return;
  }
  list.innerHTML = visible.map(g => {
    const idx = grants.indexOf(g);
    const isOpen = openCard === idx;
    return `<div class="grant-card${isOpen ? ' is-open' : ''}" onclick="toggle(${idx})">
      <div class="grant-header">
        <div class="grant-info">
          <div class="grant-name">${g.name}</div>
          <div class="grant-meta">
            <span class="badge ${statusBadge[g.status]}">${g.statusLabel}</span>
            <span class="badge badge-gray">${g.funding}</span>
          </div>
        </div>
        ${dots(g.relevance)}
        ${chevronSVG()}
      </div>
      <div class="grant-detail${isOpen ? ' open' : ''}">
        <div class="detail-section">
          <div class="detail-label">About this grant</div>
          <div class="detail-text">${g.overview}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">WildMon fit</div>
          <div class="detail-text highlighted">${g.fit}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Deadline</div>
          <div class="detail-deadline">${g.deadline}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function toggle(i) {
  openCard = openCard === i ? null : i;
  render();
}

function updateStats() {
  document.getElementById('s-apply').textContent = grants.filter(g => g.status === 'open').length;
  document.getElementById('s-upcoming').textContent = grants.filter(g => g.status === 'upcoming').length;
  document.getElementById('s-closed').textContent = grants.filter(g => g.status === 'closed').length;
  document.getElementById('s-check').textContent = grants.filter(g => g.status === 'check').length;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === 'all') {
      const allOn = Object.values(filterState).every(v => v);
      Object.keys(filterState).forEach(k => filterState[k] = !allOn);
      btn.classList.toggle('active-all', !allOn);
    } else {
      filterState[f] = !filterState[f];
      const activeClass = { open: 'active-open', upcoming: 'active-amber', closed: 'active-closed', check: 'active-purple' }[f];
      btn.classList.toggle(activeClass, filterState[f]);
      const allActive = Object.values(filterState).every(v => v);
      document.querySelector('[data-filter="all"]').classList.toggle('active-all', allActive);
    }
    render();
  });
});

render();
</script>
